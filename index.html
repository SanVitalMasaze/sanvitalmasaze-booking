<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rezervacija termina – SanVital</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Rezervacija termina</h1>

    <div id="calendar"></div>

    <div id="time-slots"></div>

    <form id="booking-form" style="display:none;">
        <h2>Vaši podatki</h2>
        <input type="text" id="name" placeholder="Ime in priimek" required>
        <input type="email" id="email" placeholder="Email" required>
        <button type="submit">Potrdi rezervacijo</button>
    </form>

    <script src="script.js"></script>
</body>
</html>
